version: '3.8'

services:
  bidnova-server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      DB_URL: jdbc:mysql://mysql:3306/auction_db
      DB_USER: root
      DB_PASSWORD: root123
      JWT_SECRET: E4aKywl5o8u6LekAb9jKIr0Nqduhet6+n4QBDFzSLJU=
    depends_on:
      - mysql
    networks:
      - bidnova-network

  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: auction_db
    volumes:
      - ./db_setup.sql:/docker-entrypoint-initdb.d/db_setup.sql
      - mysql-data:/var/lib/mysql
    networks:
      - bidnova-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

volumes:
  mysql-data:

networks:
  bidnova-network:
    driver: bridge
