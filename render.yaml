services:
    - type: web
      name: bidnova-server
      env: java
      plan: starter
      buildCommand: mvn clean package -DskipTests
      startCommand: java -cp "server/target/classes:server/target/dependency/*" com.bidnova.ServerMain
      envVars:
          - key: DB_URL
            value: jdbc:mysql://{{ RAILWAY_MYSQL_HOST }}:{{ RAILWAY_MYSQL_PORT }}/{{ RAILWAY_MYSQL_DB }}?useSSL=false&allowMultiQueries=true&autoReconnect=true
          - key: DB_USER
            value: "{{ RAILWAY_MYSQL_USER }}"
          - key: DB_PASSWORD
            value: "{{ RAILWAY_MYSQL_PASSWORD }}"
          - key: PORT
            value: "8888"
          - key: JAVA_OPTS
            value: "-Xmx512m -Xms256m"
      domains:
          - bidnova-server.onrender.com

databases:
    - name: bidnova-db
      engine: mysql
      version: "8"
      plan: starter
